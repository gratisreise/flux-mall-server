server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: root1234          # 로컬 DB 비번

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT 개발용 시크릿 (절대 운영에 쓰지 마세요!)
jwt:
  access_secret: ${JWT_ACCESS_SECRET}
  refersh_secret: ${JWT_REFRESH_SECRET}

# 개발 시 상세 로깅 + 디버그
logging:
  level:
    com.example: DEBUG
    org.mybatis: DEBUG
    org.springframework.security: DEBUG

# Swagger, Actuator 모두 노출
management:
  endpoints:
    web:
      exposure:
        include: "*"

mybatis:
  configuration:
    # MyBatis 로그 출력 (개발 단계에서 쿼리 확인용)
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl