server:
  port: 8080  # 또는 80/443 (Nginx 뒤에서라면 8080 유지)

spring:
  datasource:
    url: ${DB_URL}                     # 환경변수나 외부 Config Server로 주입 강력 추천
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration

# 운영용 JWT 시크릿 (반드시 환경변수로 관리!)
jwt:
  access_secret: ${JWT_ACCESS_SECRET}
  refersh_secret: ${JWT_REFRESH_SECRET}

# S3 버킷명 운영 전용
app:
  s3:
    bucket: prod-ecommerce-bucket-2026

# 운영은 보안 강화
management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.example: INFO
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/ecommerce/app.log   # 운영 서버 로그 경로 예시