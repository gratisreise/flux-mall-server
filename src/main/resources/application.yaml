spring:
  profiles:
    active: dev  # ??? prod? ??(???? ??????)

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.fluxmall.domain.**.dto, com.fluxmall.domain.**.entity
  configuration:
    map-underscore-to-camel-case: true
    # 쿼리 결과가 null일 때 필드에 null을 설정 (false면 필드 자체가 생성 안 됨)
    call-setters-on-nulls: true
    default-statement-timeout: 30

# JWT ?? ??
jwt:
  access-token-expiration: 1800000    # 30? (ms)
  refresh-token-expiration: 604800000 # 7? (ms)

# AWS S3 ??
cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false

# Actuator ??
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# Logging ??
logging:
  level:
    com.fluxmall: INFO
    org.springframework: WARN